logging:
  config: classpath:log4j2.xml

server:
  servlet:
    context-path: /RestauranteAPI

spring:
  application:
    name: restauranteapi

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  servlet:
    encoding:
      charset: UTF-8
      force: true

  jpa:
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    web:
      pageable:
        one-indexed-parameters: true

  web:
    error:
      include-stacktrace: never

---

spring:
  config:
    activate:
      on-profile: dev

  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 9017

---

spring:
  config:
    activate:
      on-profile: prod

server:
  port: 9027

---

spring:
  config:
    activate:
      on-profile: test